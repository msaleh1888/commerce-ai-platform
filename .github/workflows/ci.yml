name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend and worker
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run backend and worker tests
        run: python -m pytest tests/unit tests/integration

      - name: Enforce architecture boundaries
        run: python tools/architecture/check_boundaries.py

      - name: Test architecture boundary checker
        run: python -m pytest tests/architecture

      - name: Validate migrations
        run: python -m alembic -c apps/api/alembic.ini upgrade head --sql

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run frontend tests
        run: npm run test

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Run Playwright screenshot smoke tests
        run: npm run test:smoke:screenshots

      - name: Upload Playwright screenshots
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-screenshots
          path: apps/web/tests/playwright/.artifacts/screenshots
          if-no-files-found: error

      - name: Upload Playwright diagnostic artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-diagnostics
          path: |
            apps/web/tests/playwright/.artifacts/html-report
            apps/web/tests/playwright/.artifacts/test-results

      - name: Build frontend
        run: npm run build

  compose:
    name: Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Start API runtime
        run: docker compose up --build --wait api

      - name: Apply database migrations
        run: docker compose run --rm api python -m alembic -c apps/api/alembic.ini upgrade head

      - name: Apply M2 demo identity and tenancy seed
        env:
          COMMERCE_AI_DEMO_SEED_PASSWORD: ci-only-demo-password
        run: docker compose run --rm -e COMMERCE_AI_DEMO_SEED_PASSWORD api python -m commerce_ai_api.scripts.seed_demo --apply

      - name: Authenticate a seeded demo user
        env:
          COMMERCE_AI_DEMO_SEED_PASSWORD: ci-only-demo-password
        run: |
          cookie_jar="$RUNNER_TEMP/commerce-ai-session-cookie.txt"
          curl --fail --silent --show-error --cookie-jar "$cookie_jar" \
            --header 'Content-Type: application/json' \
            --data "{\"email\":\"nora.manager@northstar.example\",\"password\":\"${COMMERCE_AI_DEMO_SEED_PASSWORD}\"}" \
            http://localhost:8000/auth/login
          curl --fail --silent --show-error --cookie "$cookie_jar" http://localhost:8000/auth/session \
            | grep --fixed-strings '"email":"nora.manager@northstar.example"'

      - name: Tear down Docker Compose runtime
        if: always()
        run: docker compose down -v
